<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AltLoc AI SoundLab</title>

<style>
body{
    margin:0;
    background:radial-gradient(circle at top,#111 0%,#050505 65%);
    color:white;
    font-family:Arial,sans-serif;
    text-align:center;
    overflow-x:hidden;
}
header{
    padding:30px 20px;
    background:linear-gradient(135deg,#111,#1d1d1d);
    border-bottom:1px solid #222;
}
h1{
    margin:0;
    font-size:38px;
    color:#00ffcc;
    text-shadow:0 0 20px #00ffcc;
}
p{color:#aaa;}
.container{
    width:90%;
    max-width:560px;
    margin:auto;
    padding:20px;
}
.pricing{
    display:flex;
    gap:15px;
    flex-wrap:wrap;
    margin-top:25px;
}
.plan{
    flex:1;
    min-width:210px;
    background:#111;
    border:1px solid #222;
    border-radius:18px;
    padding:18px;
}
.plan h2{color:#00ffcc;}
.plan h3{font-size:30px;margin:10px 0;}
.pro{
    border-color:#00ffcc;
    box-shadow:0 0 25px #00ffcc33;
}
.box{
    margin-top:25px;
    padding:22px;
    background:rgba(20,20,20,0.9);
    border:1px solid #222;
    border-radius:22px;
    box-shadow:0 0 25px rgba(0,255,204,0.15);
}
.step{
    display:none;
    margin-top:18px;
    padding:15px;
    background:#111;
    border:1px solid #222;
    border-radius:16px;
    text-align:left;
    animation:fadeIn .35s ease;
}
.step.active{display:block;}
@keyframes fadeIn{
    from{opacity:0;transform:translateY(10px);}
    to{opacity:1;transform:translateY(0);}
}
label{
    display:block;
    color:#00ffcc;
    font-weight:bold;
    margin-bottom:10px;
}
select,input[type="text"]{
    width:100%;
    padding:15px;
    background:#222;
    color:white;
    border:none;
    border-radius:12px;
    font-size:16px;
}
.slider{
    width:100%;
    appearance:none;
    -webkit-appearance:none;
    height:8px;
    border-radius:10px;
    background:#222;
    outline:none;
}
.slider::-webkit-slider-thumb{
    -webkit-appearance:none;
    appearance:none;
    width:23px;
    height:23px;
    border-radius:50%;
    background:#00ffcc;
    cursor:pointer;
    box-shadow:0 0 15px #00ffcc;
}
.value{
    margin-top:10px;
    color:white;
    font-weight:bold;
}
button{
    width:100%;
    padding:15px;
    margin-top:20px;
    border:none;
    border-radius:12px;
    background:#00ffcc;
    color:black;
    font-weight:bold;
    font-size:16px;
    cursor:pointer;
    box-shadow:0 0 20px #00ffcc55;
}
button:hover{
    transform:scale(1.02);
}
#loadingBox{
    display:none;
    margin-top:20px;
}
.progressBar{
    width:100%;
    height:18px;
    background:#222;
    border-radius:20px;
    overflow:hidden;
}
.progress{
    width:0%;
    height:100%;
    background:#00ffcc;
}
#result{
    display:none;
    margin-top:20px;
    padding:18px;
    background:#0d0d0d;
    border-radius:15px;
    text-align:left;
    white-space:pre-wrap;
}
#visualizer{
    height:110px;
    margin-top:22px;
    display:flex;
    align-items:flex-end;
    gap:5px;
    padding:10px;
    background:#0f0f0f;
    border-radius:16px;
}
.bar{
    flex:1;
    background:#00ffcc;
    border-radius:8px;
    animation:bars 1s infinite ease-in-out;
}
.bar:nth-child(2){animation-delay:.1s;}
.bar:nth-child(3){animation-delay:.2s;}
.bar:nth-child(4){animation-delay:.3s;}
.bar:nth-child(5){animation-delay:.4s;}
.bar:nth-child(6){animation-delay:.5s;}
.bar:nth-child(7){animation-delay:.6s;}
.bar:nth-child(8){animation-delay:.7s;}
@keyframes bars{
    0%{height:20%;}
    50%{height:95%;}
    100%{height:30%;}
}
.downloads{display:none;}
.downloads button{
    background:#222;
    color:#00ffcc;
}
footer{
    margin-top:35px;
    padding:20px;
    color:#555;
}
</style>
</head>

<body>

<header>
<h1>AltLoc AI SoundLab</h1>
<p>AI Sound Designer For Producers</p>
</header>

<div class="container">

<div class="pricing">
<div class="plan">
<h2>Basic</h2>
<h3>$1</h3>
<p>Limited generations</p>
<p>Basic export</p>
<p>Standard quality</p>
</div>

<div class="plan pro">
<h2>Pro</h2>
<h3>$5/month</h3>
<p>All options</p>
<p>Full AI engine</p>
<p>WAV / FLAC / STEMS</p>
</div>
</div>

<div class="box">

<div class="step active" id="stepGenre">
<label>1. Choose Genre</label>
<select id="genre" onchange="openStep('stepBpm')">
<option value="">Select Genre</option>
<option>Psytrance</option>
<option>Progressive Psy</option>
<option>Full On</option>
<option>Dark Psy</option>
<option>Progressive Techno</option>
<option>Melodic Techno</option>
<option>Afro House</option>
<option>Drum & Bass</option>
<option>Ambient</option>
<option>Cinematic</option>
<option>Experimental</option>
</select>
</div>

<div class="step" id="stepBpm">
<label>2. BPM</label>
<input type="range" id="bpm" min="1" max="999" value="140" class="slider" oninput="bpmValue.innerText=this.value + ' BPM'">
<div class="value" id="bpmValue">140 BPM</div>
<button onclick="openStep('stepScale')">Next</button>
</div>

<div class="step" id="stepScale">
<label>3. Scale</label>
<select id="scale" onchange="openStep('stepSound')">
<option value="">Select Scale</option>
<option>Minor</option>
<option>Major</option>
<option>Phrygian</option>
<option>Harmonic Minor</option>
<option>Dorian</option>
<option>Arabic</option>
<option>Japanese</option>
<option>Chromatic</option>
</select>
</div>

<div class="step" id="stepSound">
<label>4. Sound Type</label>
<select id="soundType" onchange="openStep('stepMood')">
<option value="">Select Sound</option>
<option>Kick</option>
<option>Bassline</option>
<option>Psy Bass</option>
<option>Lead</option>
<option>Pluck</option>
<option>Atmosphere</option>
<option>FX</option>
<option>Impact</option>
<option>Vocal Chop</option>
<option>Full Loop</option>
</select>
</div>

<div class="step" id="stepMood">
<label>5. Character / Mood</label>
<select id="mood" onchange="openStep('stepBars')">
<option value="">Select Character</option>
<option>Dark</option>
<option>Warm</option>
<option>Metallic</option>
<option>Aggressive</option>
<option>Wide Stereo</option>
<option>Psychedelic</option>
<option>Cinematic</option>
<option>Glitch</option>
<option>Dreamy</option>
</select>
</div>

<div class="step" id="stepBars">
<label>6. Length / Bars</label>
<select id="bars" onchange="openStep('stepVariations')">
<option value="">Select Length</option>
<option>One Shot</option>
<option>1 Bar</option>
<option>2 Bars</option>
<option>4 Bars</option>
<option>8 Bars</option>
<option>16 Bars</option>
<option>32 Bars</option>
<option>64 Bars</option>
</select>
</div>

<div class="step" id="stepVariations">
<label>7. Number Of Variations</label>
<input type="range" id="variations" min="1" max="10" value="3" class="slider" oninput="variationValue.innerText=this.value + ' Variations'">
<div class="value" id="variationValue">3 Variations</div>
<button onclick="openStep('stepContinuation')">Next</button>
</div>

<div class="step" id="stepContinuation">
<label>8. Continuation Style</label>
<select id="continuation" onchange="openStep('stepFile')">
<option value="">Select Continuation</option>
<option>Main Idea Only</option>
<option>3 Follow-Up Ideas</option>
<option>Build Up Continuation</option>
<option>Drop Continuation</option>
<option>Atmospheric Expansion</option>
<option>Glitch Transition</option>
<option>Aggressive Evolution</option>
<option>Festival Version</option>
</select>
</div>

<div class="step" id="stepFile">
<label>9. Export File</label>
<select id="fileType" onchange="openStep('stepGenerate')">
<option value="">Select File Type</option>
<option>WAV</option>
<option>MP3</option>
<option>FLAC</option>
<option>MIDI</option>
<option>STEMS</option>
<option>PROJECT</option>
</select>
</div>

<div class="step" id="stepGenerate">
<button onclick="generateIdea()">Generate AI Sound</button>
<button onclick="generateImage()">🎨 Generate AI Image</button>
</div>

<div id="loadingBox">
<p>Generating futuristic sound...</p>
<div class="progressBar"><div class="progress" id="progress"></div></div>
</div>

<div id="result"></div>

<audio controls style="width:100%;margin-top:20px;"></audio>

<div id="visualizer">
<div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
<div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
</div>

<div class="downloads" id="downloads">
<button onclick="alert('Real download will be connected with backend')">Download File</button>
<button onclick="alert('Project export will be connected later')">Download Project</button>
</div>

</div>
</div>

<footer>ALTLOC AI © 2026</footer>

<script>

/* Hidden AI knowledge base - not displayed to user */
const aiSoundBrain = [
"Kontakt 8","Massive","Massive X","FM8","Absynth 5","Monark","Reaktor 6",
"Reaktor Razor","Reaktor Prism","Super 8","Battery 4","Polyplex",
"Noire","Piano Colors","Analog Dreams","Hybrid Keys","Ethereal Earth",
"Lo-Fi Glow","Cloud Supply","Glaze","Soul Sessions","Duets",
"Action Strings 2","Session Strings Pro 2","Session Horns Pro","Mysteria",
"Thrill","Lores","Choir Omnia","Straylight","Pharlight","Ashlight",
"Damage 2","Electric Mint","Picked Acoustic","Prime Bass","Studio Drummer",
"Butch Vig Drums","Empire Breaks","Ozone 11","Neutron 5","Nectar 4",
"RX 11","Trash","Guitar Rig 7","Raum","Replika XT","Driver",
"Supercharger GT","Transient Master","Solid Bus Comp","Solid EQ",
"Polyverse Manipulator","Polyverse Comet","Polyverse Gatekeeper",
"Polyverse Wider","Polyverse Supermodal","Polyverse Filterverse",
"Infiltrator 2","ShaperBox 3","Portal","Thermal","Movement","Effectrix",
"Turnado","Glitch 2","Fracture","Hysteresis","Tantra","Granulator",
"Quanta 2","Padshop","Fragments","Emergence","Blackhole",
"Valhalla Shimmer","Kickstart 2","Trackspacer","VolumeShaper",
"TimeShaper","PanShaper","FilterShaper","Spectralayers","VocAlign",
"Vocodex","Output Arcade","Output Movement","Output Thermal",
"Output Portal","Output Signal","Serum","Vital","Omnisphere","Diva",
"Pigments","Sylenth1","Spire","Falcon","Phase Plant","Avenger",
"Nexus","Zebra2","Dune 3","Hive 2","Current","ANA 2","Icarus",
"ElectraX","Harmor","Sytrus","Surge XT","VCV Rack"
];

function openStep(id){
    document.getElementById(id).classList.add("active");
    setTimeout(()=>{
        document.getElementById(id).scrollIntoView({behavior:"smooth",block:"center"});
    },150);
}

function generateIdea(){

const genre = document.getElementById("genre").value;
const bpm = document.getElementById("bpm").value + " BPM";
const scale = document.getElementById("scale").value;
const soundType = document.getElementById("soundType").value;
const mood = document.getElementById("mood").value;
const bars = document.getElementById("bars").value;
const variations = document.getElementById("variations").value;
const continuation = document.getElementById("continuation").value;
const fileType = document.getElementById("fileType").value;

const loadingBox = document.getElementById("loadingBox");
const progress = document.getElementById("progress");
const result = document.getElementById("result");
const downloads = document.getElementById("downloads");

loadingBox.style.display="block";
result.style.display="none";
downloads.style.display="none";
progress.style.width="0%";

let percent = 0;

const interval = setInterval(()=>{

percent += 5;
progress.style.width = percent + "%";

if(percent >= 100){

clearInterval(interval);
loadingBox.style.display="none";

result.innerText =
`AI SOUND REQUEST

Genre: ${genre}
BPM: ${bpm}
Scale: ${scale}
Sound Type: ${soundType}
Character: ${mood}
Length: ${bars}
Variations: ${variations}
Continuation: ${continuation}
Export File: ${fileType}

AI PLAN

The AI will internally choose the right synth engines, effects, modulation, stereo movement, saturation, filtering and mastering chain.

Variation System:

1. Main Version
2. Alternative Groove
3. Atmospheric Version
4. Aggressive Version

Continuation Ideas:

• Build-up continuation
• Drop continuation
• Glitch transition
• Wider stereo expansion
• More cinematic texture

Sound Design Direction:

• Deep low-end control
• Metallic FM movement
• Granular or glitch motion
• Wide stereo image
• Analog-style saturation
• Clean transient shaping

Status:
Demo logic ready. Real AI audio backend is the next step.`;

result.style.display="block";
downloads.style.display="block";

}

},100);

}

function generateImage(){
alert("AI image generation will be connected later.");
}

</script>

</body>
</html>
