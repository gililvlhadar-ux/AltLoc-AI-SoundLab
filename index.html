<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AltLoc AI SoundLab</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #090909;
      color: white;
      text-align: center;
    }

    header {
      padding: 30px 20px;
      background: linear-gradient(135deg, #111, #222);
    }

    h1 {
      font-size: 34px;
      margin: 0;
      color: #00ffcc;
    }

    p {
      color: #ccc;
    }

    .box {
      margin: 25px auto;
      padding: 20px;
      width: 85%;
      max-width: 420px;
      background: #161616;
      border-radius: 18px;
      box-shadow: 0 0 20px #00ffcc33;
    }

    select,
    button {
      width: 100%;
      padding: 14px;
      margin-top: 15px;
      border-radius: 12px;
      border: none;
      font-size: 16px;
    }

    button {
      background: #00ffcc;
      color: #000;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      opacity: 0.9;
    }

    .progress-container {
      width: 100%;
      height: 12px;
      background: #222;
      border-radius: 20px;
      margin-top: 20px;
      overflow: hidden;
      display: none;
    }

    .progress-bar {
      height: 100%;
      width: 0%;
      background: #00ffcc;
      transition: width 0.2s;
    }

    .result {
      margin-top: 20px;
      padding: 15px;
      background: #000;
      border-radius: 12px;
      color: #00ffcc;
      min-height: 80px;
    }

    .loading-text {
      margin-top: 10px;
      color: #aaa;
      font-size: 14px;
    }
  </style>
</head>

<body>

  <header>
    <h1>AltLoc AI SoundLab</h1>
    <p>AI Sound Pack Generator</p>
  </header>

  <div class="box">

    <h2>Create Sound Pack</h2>

    <select id="style">
      <option value="Psytrance">Psytrance</option>
      <option value="Techno">Techno</option>
      <option value="Afro House">Afro House</option>
      <option value="Cinematic">Cinematic</option>
      <option value="Trap">Trap</option>
    </select>

    <select id="type">
      <option value="Kick">Kick</option>
      <option value="Bass">Bass</option>
      <option value="FX">FX</option>
      <option value="Vocal Chop">Vocal Chop</option>
      <option value="Full Pack">Full Pack</option>
    </select>

  <button onclick="alert('Button works'); generateIdea();">
  Generate Sound Idea
</button>

    <div class="progress-container" id="progressContainer">
      <div class="progress-bar" id="progressBar"></div>
    </div>

    <div class="loading-text" id="loadingText"></div>

    <div class="result" id="result">
      Your sound pack idea will appear here...
    </div>

  </div>

  <script>

    function generateIdea() {

      const genre = document.getElementById("style").value;
      const type = document.getElementById("type").value;

      const result = document.getElementById("result");
      const progressBar = document.getElementById("progressBar");
      const progressContainer = document.getElementById("progressContainer");
      const loadingText = document.getElementById("loadingText");

      progressContainer.style.display = "block";

      let progress = 0;

      result.innerHTML = "";
      loadingText.innerHTML = "Generating AI Sound Pack...";

      const interval = setInterval(() => {

        progress += 5;

        progressBar.style.width = progress + "%";

        loadingText.innerHTML =
          "Generating AI Sound Pack... " + progress + "%";

        if (progress >= 100) {

          clearInterval(interval);

          const ideas = [
            `Dark ${genre} kick pack with cinematic impacts`,
            `${genre} vocal chops and ${type} textures`,
            `Industrial ${genre} transition FX pack`,
            `${genre} bass one-shots with analog warmth`,
            `${type} atmospheres for ${genre} producers`,
            `${genre} festival drops and risers collection`,
            `${genre} cinematic trailer sounds with deep ${type} layers`,
            `Heavy ${genre} groove pack for underground producers`,
            `${type} toolkit inspired by futuristic rave culture`
          ];

          const randomIdea =
            ideas[Math.floor(Math.random() * ideas.length)];

          result.innerHTML =
            "<h2>🔥 Generated Idea:</h2><p>" +
            randomIdea +
            "</p>";

          loadingText.innerHTML = "Generation Complete ✅";
        }

      }, 100);

    }

  </script>

</body>
</html>
