<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AltLoc AI SoundLab</title>

<style>

body{
    margin:0;
    background:#0a0a0a;
    color:white;
    font-family:Arial,sans-serif;
    text-align:center;
}

header{
    padding:30px;
    background:linear-gradient(135deg,#111,#1d1d1d);
}

h1{
    margin:0;
    font-size:38px;
    color:#00ffcc;
}

p{
    color:#aaa;
}

.container{
    width:90%;
    max-width:500px;
    margin:auto;
    padding:20px;
}

.box{
    background:#151515;
    padding:20px;
    border-radius:20px;
    margin-top:20px;
    box-shadow:0 0 20px rgba(0,255,204,0.15);
}

select,
button{
    width:100%;
    padding:15px;
    margin-top:15px;
    border:none;
    border-radius:12px;
    font-size:16px;
}

select{
    background:#222;
    color:white;
}

button{
    background:#00ffcc;
    color:black;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    transform:scale(1.03);
}

#loadingBox{
    display:none;
    margin-top:20px;
}

.progressBar{
    width:100%;
    height:20px;
    background:#222;
    border-radius:20px;
    overflow:hidden;
    margin-top:10px;
}

.progress{
    width:0%;
    height:100%;
    background:#00ffcc;
    transition:0.2s;
}

#result{
    margin-top:20px;
    padding:20px;
    background:#111;
    border-radius:15px;
    text-align:left;
    white-space:pre-wrap;
    display:none;
}

.downloads{
    margin-top:20px;
}

.downloads button{
    background:#222;
    color:#00ffcc;
}

footer{
    margin-top:40px;
    padding:20px;
    color:#555;
}

</style>
</head>
<body>

<header>
    <h1>AltLoc AI SoundLab</h1>
    <p>Create futuristic AI sound ideas instantly</p>
</header>

<div class="container">

    <div class="box">

        <select id="genre">
            <option>Psytrance</option>
            <option>Progressive Techno</option>
            <option>Afro House</option>
            <option>Melodic Techno</option>
            <option>Drum & Bass</option>
        </select>

        <select id="soundType">
            <option>Kick</option>
            <option>Bassline</option>
            <option>Lead</option>
            <option>Atmosphere</option>
            <option>FX</option>
            <option>Full Loop</option>
        </select>

        <select id="bars">
            <option>One Shot</option>
            <option>4 Bars</option>
            <option>8 Bars</option>
            <option>16 Bars</option>
            <option>32 Bars</option>
        </select>

        <button onclick="generateIdea()">
            Generate AI Sound
        </button>

        <div id="loadingBox">

            <p>Generating futuristic sound...</p>

            <div class="progressBar">
                <div class="progress" id="progress"></div>
            </div>

        </div>

        <div id="result"></div>

        <div class="downloads" id="downloads" style="display:none;">

            <button>
                Download WAV
            </button>

            <button>
                Download MIDI
            </button>

            <button>
                Download Project
            </button>

        </div>

    </div>

</div>

<footer>
ALTLOC AI © 2026
</footer>

<script>

function generateIdea(){

    const genre =
    document.getElementById("genre").value;

    const type =
    document.getElementById("soundType").value;

    const bars =
    document.getElementById("bars").value;

    const loadingBox =
    document.getElementById("loadingBox");

    const progress =
    document.getElementById("progress");

    const result =
    document.getElementById("result");

    const downloads =
    document.getElementById("downloads");

    loadingBox.style.display="block";
    result.style.display="none";
    downloads.style.display="none";

    let percent = 0;

    const interval = setInterval(()=>{

        percent += 5;

        progress.style.width =
        percent + "%";

        if(percent >= 100){

            clearInterval(interval);

            loadingBox.style.display="none";

            const ideas = [

`Genre: ${genre}

Type: ${type}

Length: ${bars}

Sound Design:

• Deep rolling bass
• Metallic FM textures
• Reverse atmospheres
• Granular glitch effects
• Stereo movement automation
• Psytrance-style energy
• Analog saturation layer

AI Variations:

1. Dark version
2. Festival version
3. Atmospheric version
4. Aggressive version

Recommended Plugins:

• Serum
• Vital
• Diva
• Kontakt
• Ozone 11

Mix Notes:

• Sidechain compression
• Wide stereo image
• Soft clipping
• Dynamic transient shaping`

            ];

            result.innerText =
            ideas[Math.floor(Math.random()*ideas.length)];

            result.style.display="block";

            downloads.style.display="block";

        }

    },120);

}

</script>

</body>
</html>
