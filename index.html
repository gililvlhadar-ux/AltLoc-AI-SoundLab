<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AltLoc AI SoundLab</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #090909;
      color: white;
      text-align: center;
    }

    header {
      padding: 45px 20px 55px;
      background: linear-gradient(135deg, #111, #222);
    }

    h1 {
      font-size: 40px;
      margin: 0;
      color: #00ffcc;
      letter-spacing: 1px;
    }

    header p {
      color: #ccc;
      font-size: 20px;
      margin-top: 18px;
    }

    .box {
      margin: 45px auto;
      padding: 28px 24px;
      width: 88%;
      max-width: 460px;
      background: #161616;
      border-radius: 24px;
      box-shadow: 0 0 35px rgba(0, 255, 204, 0.22);
    }

    h2 {
      font-size: 30px;
      margin-bottom: 28px;
    }

    select {
      width: 100%;
      padding: 18px;
      margin: 9px 0;
      border: none;
      border-radius: 15px;
      font-size: 18px;
      font-weight: bold;
      background: #eeeeee;
      color: #000;
    }

    button {
      width: 100%;
      margin-top: 18px;
      padding: 19px;
      border: none;
      border-radius: 15px;
      background: #00ddbb;
      color: #000;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
    }

    button:active {
      transform: scale(0.98);
    }

    #progressContainer {
      width: 100%;
      height: 16px;
      background: #222;
      border-radius: 30px;
      overflow: hidden;
      margin-top: 24px;
      display: none;
    }

    #progressBar {
      width: 0%;
      height: 100%;
      background: #00ffcc;
      transition: width 0.2s;
    }

    #status {
      margin-top: 18px;
      color: #bbb;
      font-size: 18px;
      min-height: 25px;
    }

    .result-box {
      background: #000;
      padding: 28px 18px;
      border-radius: 18px;
      margin-top: 22px;
      font-size: 20px;
      line-height: 1.45;
    }

    .result-title {
      color: #00ffcc;
      font-size: 26px;
      font-weight: bold;
      margin-bottom: 20px;
    }

    .small-btn {
      margin-top: 18px;
      padding: 14px;
      font-size: 16px;
      border-radius: 12px;
    }

    footer {
      color: #666;
      padding: 25px;
      font-size: 14px;
    }
  </style>
</head>

<body>

  <header>
    <h1>AltLoc AI SoundLab</h1>
    <p>AI Sound Pack Generator</p>
  </header>

  <main>
    <section class="box">
      <h2>Create Sound Pack</h2>

      <select id="genre">
        <option>Psytrance</option>
        <option>Progressive Psytrance</option>
        <option>Techno</option>
        <option>Afro Techno</option>
        <option>Melodic Techno</option>
        <option>Ambient</option>
        <option>Cinematic</option>
      </select>

      <select id="soundType">
        <option>Kick</option>
        <option>Bass</option>
        <option>Percussion</option>
        <option>Atmosphere</option>
        <option>FX</option>
        <option>Lead</option>
        <option>Vocal Chop</option>
        <option>Full Pack</option>
      </select>

      <button onclick="generateIdea()">Generate Sound Idea</button>

      <div id="progressContainer">
        <div id="progressBar"></div>
      </div>

      <p id="status"></p>

      <div id="result"></div>
    </section>
  </main>

  <footer>
    Created by Gili ALT LOC Hadar
  </footer>

  <script>
    let generatedText = "";

    function generateIdea() {
      const genre = document.getElementById("genre").value;
      const type = document.getElementById("soundType").value;

      const progressContainer = document.getElementById("progressContainer");
      const progressBar = document.getElementById("progressBar");
      const status = document.getElementById("status");
      const result = document.getElementById("result");

      progressContainer.style.display = "block";
      progressBar.style.width = "0%";
      status.innerHTML = "Generating...";
      result.innerHTML = "";

      let width = 0;

      const interval = setInterval(function () {
        width += 5;
        progressBar.style.width = width + "%";

        if (width >= 100) {
          clearInterval(interval);

          const ideas = [
            `${genre} cinematic trailer sounds with deep ${type} layers`,
            `${genre} rolling groove ${type} with analog warmth`,
            `${genre} metallic FM ${type} textures with wide stereo movement`,
            `${genre} festival-ready ${type} pack with punchy transient design`,
            `${genre} dark psychedelic ${type} atmosphere with robotic details`,
            `${genre} sunrise vibe ${type} sound design with emotional energy`,
            `${genre} aggressive distorted ${type} collection for peak-time drops`,
            `${genre} futuristic robotic ${type} elements with glitch movement`,
            `${genre} hypnotic tribal ${type} patterns with organic percussion`,
            `${genre} wide ambient ${type} soundscape with deep space reverb`
          ];

          generatedText = ideas[Math.floor(Math.random() * ideas.length)];

          status.innerHTML = "Generation Complete ✅";

          result.innerHTML = `
            <div class="result-box">
              <div class="result-title">🔥 Generated Idea:</div>
              <div>${generatedText}</div>
              <button class="small-btn" onclick="copyIdea()">Copy Prompt</button>
            </div>
          `;
        }
      }, 70);
    }

    function copyIdea() {
      if (!generatedText) {
        alert("Generate an idea first");
        return;
      }

      navigator.clipboard.writeText(generatedText)
        .then(function () {
          alert("Prompt copied!");
        })
        .catch(function () {
          alert("Copy failed. You can copy the text manually.");
        });
    }
  </script>

</body>
</html>
