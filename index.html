<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AltLoc AI SoundLab</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #090909;
      color: white;
      text-align: center;
    }

    header {
      padding: 30px 20px;
      background: linear-gradient(135deg, #111, #222);
    }

    h1 {
      font-size: 34px;
      margin: 0;
      color: #00ffcc;
    }

    p {
      color: #ccc;
    }

    .box {
      margin: 25px auto;
      padding: 20px;
      width: 85%;
      max-width: 420px;
      background: #161616;
      border-radius: 18px;
      box-shadow: 0 0 20px #00ffcc33;
    }

    select, button {
      width: 100%;
      padding: 14px;
      margin-top: 15px;
      border-radius: 12px;
      border: none;
      font-size: 16px;
    }

    button {
      background: #00ffcc;
      color: #000;
      font-weight: bold;
    }

    .result {
      margin-top: 20px;
      padding: 15px;
      background: #000;
      border-radius: 12px;
      color: #00ffcc;
      min-height: 80px;
    }
  </style>
</head>
<body>

  <header>
    <h1>AltLoc AI SoundLab</h1>
    <p>AI Sound Pack Generator</p>
  </header>

  <div class="box">
    <h2>Create Sound Pack</h2>

    <select id="style">
      <option value="Psytrance">Psytrance</option>
      <option value="Techno">Techno</option>
      <option value="Afro House">Afro House</option>
      <option value="Cinematic">Cinematic</option>
      <option value="Trap">Trap</option>
    </select>

    <select id="type">
      <option value="Kick">Kick</option>
      <option value="Bass">Bass</option>
      <option value="FX">FX</option>
      <option value="Vocal Chop">Vocal Chop</option>
      <option value="Full Pack">Full Pack</option>
    </select>

    <button onclick="generateIdea()">Generate Sound Idea</button>

    <div class="result" id="result">
      Your sound pack idea will appear here...
    </div>
  </div>

    <script>
function generateIdea() {

const genre = document.getElementById("genre").value;
const type = document.getElementById("soundType").value;

const ideas = {

Psytrance: {
Kick: [
"140 BPM rolling psy kick with tight transient and analog saturation",
"Festival-ready punchy kick with deep controlled sub tail",
"Wide stereo metallic kick layer with aggressive attack"
],

Bass: [
"Rolling offbeat bass with glide and dark analog texture",
"Deep hypnotic psy bass optimized for large sound systems",
"Elastic groove bass with punchy transient movement"
],

FX: [
"Metallic FM zap with ping pong delay",
"Alien transition FX with granular freeze effect",
"Wide cinematic riser with robotic texture"
]
},

Techno: {
Kick: [
"Industrial techno kick with heavy distortion and dark tail",
"Warehouse-style analog kick with deep pressure",
"Hard groove kick with compressed transient slam"
],

Bass: [
"Driving techno rumble bass with saturated low mids",
"Dark hypnotic sub groove with analog warmth",
"Mechanical rolling bassline with industrial texture"
],

FX: [
"Cinematic tension riser with distorted atmosphere",
"Mechanical sweep FX with stereo movement",
"Dark warehouse transition impact"
]
}

};

const randomIdea =
ideas[genre][type][
Math.floor(Math.random() * ideas[genre][type].length)
];

document.getElementById("result").innerHTML = `
<h2>${genre} ${type}</h2>
<p>${randomIdea}</p>
<p>Status: AI Generator Online</p>
`;

}
</script>

      


</body>
</html>
