<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AltLoc AI SoundLab</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #090909;
      color: white;
      text-align: center;
    }

    header {
      padding: 30px 20px;
      background: linear-gradient(135deg, #111, #222);
    }

    h1 {
      font-size: 34px;
      margin: 0;
      color: #00ffcc;
    }

    p {
      color: #ccc;
    }

    .box {
      margin: 25px auto;
      padding: 20px;
      width: 85%;
      max-width: 420px;
      background: #161616;
      border-radius: 18px;
      box-shadow: 0 0 20px #00ffcc33;
    }

    select, button {
      width: 100%;
      padding: 14px;
      margin-top: 15px;
      border-radius: 12px;
      border: none;
      font-size: 16px;
    }

    button {
      background: #00ffcc;
      color: #000;
      font-weight: bold;
    }

    .result {
      margin-top: 20px;
      padding: 15px;
      background: #000;
      border-radius: 12px;
      color: #00ffcc;
      min-height: 80px;
    }
  </style>
</head>
<body>

  <header>
    <h1>AltLoc AI SoundLab</h1>
    <p>AI Sound Pack Generator</p>
  </header>

  <div class="box">
    <h2>Create Sound Pack</h2>

    <select id="style">
      <option value="Psytrance">Psytrance</option>
      <option value="Techno">Techno</option>
      <option value="Afro House">Afro House</option>
      <option value="Cinematic">Cinematic</option>
      <option value="Trap">Trap</option>
    </select>

    <select id="type">
      <option value="Kick">Kick</option>
      <option value="Bass">Bass</option>
      <option value="FX">FX</option>
      <option value="Vocal Chop">Vocal Chop</option>
      <option value="Full Pack">Full Pack</option>
    </select>

    <button onclick="generateIdea()">Generate Sound Idea</button>

    <div class="result" id="result">
      Your sound pack idea will appear here...
    </div>
  </div>

    <script>
function generateIdea() {

    const genre = document.getElementById("genre").value;
    const type = document.getElementById("soundType").value;

    document.getElementById("result").innerHTML = `
        <div style="width:100%;background:#222;border-radius:20px;overflow:hidden;margin-top:20px;">
            <div id="progressBar" style="
                width:0%;
                height:30px;
                background:#00ffd5;
                text-align:center;
                line-height:30px;
                color:black;
                font-weight:bold;
                transition:0.3s;
            ">0%</div>
        </div>

        <p style="margin-top:15px;">Generating AI Sound Pack...</p>
    `;

    let progress = 0;

    const interval = setInterval(() => {

        progress += 10;

        document.getElementById("progressBar").style.width = progress + "%";
        document.getElementById("progressBar").innerHTML = progress + "%";

        if (progress >= 100) {

            clearInterval(interval);

            const ideas = {
                "Techno": {
                    "Bass": [
                        "Dark warehouse bass with analog saturation",
                        "Industrial distorted techno bass",
                        "Deep hypnotic rolling bass"
                    ],
                    "Lead": [
                        "Acid techno lead with resonance sweeps",
                        "Berlin-style rave synth lead",
                        "Hypnotic melodic techno lead"
                    ]
                },

                "Psytrance": {
                    "Bass": [
                        "Fast offbeat psy bass",
                        "Festival psychedelic groove bass",
                        "Rolling forest psy bass"
                    ],
                    "Lead": [
                        "Alien FM psy lead",
                        "Spiritual Goa melodic lead",
                        "Aggressive psychedelic screech"
                    ]
                }
            };

            const randomIdea =
                ideas[genre][type][
                    Math.floor(Math.random() * ideas[genre][type].length)
                ];

            document.getElementById("result").innerHTML = `
                <h2>${genre} ${type}</h2>
                <p>${randomIdea}</p>
                <p style="color:#00ffd5;">Sound Pack Ready ✓</p>
            `;
        }

    }, 300);
} {
    "Techno": {
        "Bass": [
            "Dark rolling warehouse bass with analog saturation",
            "Industrial distorted techno bass for peak-time tracks",
            "Deep hypnotic low-end with FM movement"
        ],
        "Lead": [
            "Acid lead with aggressive resonance automation",
            "Melodic rave synth inspired by Berlin techno",
            "Hypnotic analog lead with delay textures"
        ]
    },

    "Psytrance": {
        "Bass": [
            "Fast offbeat psy bass with punchy attack",
            "Deep psychedelic groove bass for festival drops",
            "Rolling forest psy bass with stereo motion"
        ],
        "Lead": [
            "Alien FM psy lead with glitch effects",
            "Spiritual Goa-style melodic lead",
            "Aggressive psychedelic screech lead"
        ]
    }
};

const randomIdea =
    ideas[genre][type][
        Math.floor(Math.random() * ideas[genre][type].length)
    ];

document.getElementById("result").innerHTML = `
    <h2>${genre} ${type}</h2>
    <p>${randomIdea}</p>
    <p>Status: AI Generator Active</p>
`;
 {

Psytrance: {
Kick: [

],

},

],

Bass: [

};

<h2>${genre} ${type}</h2>

</body>
</html>
