<!DOCTYPE html>
<html lang="en">
   
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AltLoc AI SoundLab</title>

<style>
*{
    box-sizing:border-box;
}

body{
    margin:0;
    background:radial-gradient(circle at top,#151515 0%,#050505 70%);
    font-family:Arial,sans-serif;
    color:white;
    overflow-x:hidden;
}

header{
    padding:35px 20px;
    text-align:center;
    border-bottom:1px solid #222;
    background:linear-gradient(135deg,#111,#1c1c1c);
}

h1{
    margin:0;
    font-size:38px;
    color:#00ffcc;
    text-shadow:0 0 20px #00ffcc;
}

header p{
    color:#999;
}

.container{
    width:92%;
    max-width:650px;
    margin:auto;
    padding:25px 0 60px;
}

.card{
    background:#111;
    border:1px solid #222;
    border-radius:24px;
    padding:25px;
    box-shadow:0 0 25px rgba(0,255,204,0.08);
}

.choice-banner{
    margin-bottom:16px;
    padding:18px;
    border-radius:18px;
    background:#0c0c0c;
    border:1px solid #333;
    cursor:pointer;
    transition:0.25s;
}

.choice-banner:hover{
    border-color:#00ffcc;
    box-shadow:0 0 15px rgba(0,255,204,0.25);
    transform:scale(1.01);
}

.choice-label{
    color:#00ffcc;
    font-weight:bold;
    font-size:14px;
    margin-bottom:7px;
}

.choice-value{
    color:white;
    font-size:17px;
}

button{
    width:100%;
    padding:18px;
    border:none;
    border-radius:18px;
    background:#00ffcc;
    color:black;
    font-size:17px;
    font-weight:bold;
    cursor:pointer;
    margin-top:10px;
}

.loader{
    width:100%;
    height:18px;
    background:#1a1a1a;
    border-radius:30px;
    overflow:hidden;
    margin-top:25px;
    display:none;
}

.bar{
    width:0%;
    height:100%;
    background:linear-gradient(90deg,#00ffcc,#00ffaa);
    transition:0.35s;
}

.result{
    margin-top:28px;
    background:#0c0c0c;
    border:1px solid #222;
    border-radius:20px;
    padding:22px;
    display:none;
}

.result h2{
    margin-top:0;
    color:#00ffcc;
}

.tag{
    display:inline-block;
    padding:9px 14px;
    border-radius:30px;
    background:#161616;
    border:1px solid #333;
    color:#00ffcc;
    margin:5px;
    font-size:13px;
}

.idea{
    color:#ddd;
    line-height:1.6;
    margin-bottom:20px;
}

audio{
    width:100%;
    margin-top:10px;
}

footer{
    text-align:center;
    color:#555;
    margin-top:45px;
    font-size:13px;
}

/* MODAL */

.modal{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.78);
    display:none;
    align-items:center;
    justify-content:center;
    z-index:999;
    padding:20px;
}

.modal-box{
    width:100%;
    max-width:420px;
    max-height:75vh;
    background:#101010;
    border:1px solid #00ffcc;
    border-radius:24px;
    padding:20px;
    box-shadow:0 0 35px rgba(0,255,204,0.25);
}

.modal-title{
    color:#00ffcc;
    font-size:20px;
    margin-bottom:15px;
    text-align:center;
}

.option-list{
    max-height:55vh;
    overflow-y:auto;
    padding-right:5px;
}

.option{
    padding:15px;
    border-radius:14px;
    background:#181818;
    border:1px solid #2c2c2c;
    margin-bottom:10px;
    cursor:pointer;
    transition:0.2s;
}

.option:hover{
    background:#00ffcc;
    color:black;
}

.close-btn{
    margin-top:12px;
    background:#222;
    color:white;
}
</style>
</head>

<body>

<header>
    <h1>AltLoc AI SoundLab</h1>
    <p>AI Sound Generator</p>
</header>

<div class="container">
<div class="card">

<div class="choice-banner" onclick="openPicker('genre')">
    <div class="choice-label">Genre</div>
    <div class="choice-value" id="genreText">Choose Genre</div>
</div>

<div class="choice-banner" onclick="openPicker('soundType')">
    <div class="choice-label">Sound Type</div>
    <div class="choice-value" id="soundTypeText">Choose Sound Type</div>
</div>

<div class="choice-banner" onclick="openPicker('scale')">
    <div class="choice-label">Scale / Key</div>
    <div class="choice-value" id="scaleText">Choose Scale</div>
</div>

<div class="choice-banner" onclick="openPicker('bpm')">
    <div class="choice-label">BPM</div>
    <div class="choice-value" id="bpmText">Choose BPM</div>
</div>

<div class="choice-banner" onclick="openPicker('bars')">
    <div class="choice-label">Bars Length</div>
    <div class="choice-value" id="barsText">Choose Length</div>
</div>

<div class="choice-banner" onclick="openPicker('fileType')">
    <div class="choice-label">File Type</div>
    <div class="choice-value" id="fileTypeText">Choose File Type</div>
</div>

<button onclick="generateSound()">
GENERATE SOUND
</button>

<div class="loader" id="loader">
    <div class="bar" id="bar"></div>
</div>

<div class="result" id="result">

    <h2>Generated Result</h2>

    <div id="tags"></div>

    <div class="idea" id="idea"></div>

    <audio id="audioPlayer" controls loop preload="none"></audio>

</div>

</div>

<footer>
AltLoc AI SoundLab © 2026
</footer>
</div>

<div class="modal" id="modal">

    <div class="modal-box">

        <div class="modal-title" id="modalTitle">
            Choose
        </div>

        <div class="option-list" id="optionList"></div>

        <button class="close-btn" onclick="closePicker()">
            CLOSE
        </button>

    </div>

</div>

<script>

const data = {

    genre:[
        "Psytrance",
        "Progressive Psy",
        "Progressive Techno",
        "Melodic Techno",
        "Techno",
        "Tech House",
        "Afro House",
        "Minimal",
        "Drum & Bass",
        "Dubstep",
        "Trap",
        "Ambient"
    ],

    soundType:[
        "Kick",
        "Bassline",
        "Lead",
        "Piano",
        "Pad",
        "FX",
        "Atmosphere",
        "Vocal Chop",
        "One Shot",
        "Loop"
    ],

    scale:[
        "C Minor",
        "D Minor",
        "E Minor",
        "F Minor",
        "G Minor",
        "A Minor",
        "B Minor",
        "Phrygian",
        "Hijaz",
        "Goa Scale"
    ],

    bpm:[],

    bars:[
        "1 Bar",
        "2 Bars",
        "4 Bars",
        "8 Bars",
        "16 Bars",
        "32 Bars",
        "64 Bars"
    ],

    fileType:[
        "WAV",
        "MP3",
        "MIDI",
        "STEMS"
    ]
};

for(let i=60;i<=200;i++){

    data.bpm.push(i + " BPM");
}

const values = {

    genre:"",
    soundType:"",
    scale:"",
    bpm:"",
    bars:"",
    fileType:""
};

let fakeProgressTimer = null;

function openPicker(type){

    const modal = document.getElementById("modal");

    const title = document.getElementById("modalTitle");

    const list = document.getElementById("optionList");

    title.textContent = "Choose " + type;

    list.innerHTML = "";

    data[type].forEach(item=>{

        const div = document.createElement("div");

        div.className = "option";

        div.textContent = item;

        div.onclick = function(){

            values[type] = item;

            document.getElementById(type + "Text").textContent = item;

            closePicker();
        };

        list.appendChild(div);
    });

    modal.style.display = "flex";
}

function closePicker(){

    document.getElementById("modal").style.display = "none";
}

function setLoading(isLoading){

    const loader = document.getElementById("loader");

    const bar = document.getElementById("bar");

    if(isLoading){

        loader.style.display = "block";

        bar.style.width = "10%";

        let progress = 10;

        clearInterval(fakeProgressTimer);

        fakeProgressTimer = setInterval(()=>{

            progress = Math.min(progress + 7,88);

            bar.style.width = progress + "%";

        },700);

    }else{

        clearInterval(fakeProgressTimer);

        bar.style.width = "100%";

        setTimeout(()=>{

            loader.style.display = "none";

            bar.style.width = "0%";

        },500);
    }
}

function buildPrompt(){

    return `
Create a ${values.bars}
${values.soundType}
in ${values.genre}
${values.scale}
${values.bpm}

Modern
Wide stereo
Club ready
Loopable
Output ${values.fileType}
`;
}

async function generateSound(){

    if(
        !values.genre ||
        !values.soundType ||
        !values.scale ||
        !values.bpm ||
        !values.bars ||
        !values.fileType
    ){

        alert("Please complete all selections.");

        return;
    }

    const result = document.getElementById("result");

    const tags = document.getElementById("tags");

    const idea = document.getElementById("idea");

    const audioPlayer = document.getElementById("audioPlayer");

    result.style.display = "none";

    audioPlayer.pause();

    audioPlayer.removeAttribute("src");

    audioPlayer.load();

    setLoading(true);

    try{

        const response = await fetch(
            "/api/generate-sound",
            {
                method:"POST",

                headers:{
                    "Content-Type":"application/json"
                },

                body:JSON.stringify({

                    genre:values.genre,
                    soundType:values.soundType,
                    scale:values.scale,
                    bpm:values.bpm,
                    bars:values.bars,
                    fileType:values.fileType,
                    prompt:buildPrompt()
                })
            }
        );

        const data = await response.json();

        if(!response.ok){

            throw new Error(
                data.error || "API request failed"
            );
        }

        tags.innerHTML = `
            <span class="tag">${values.genre}</span>
            <span class="tag">${values.soundType}</span>
            <span class="tag">${values.scale}</span>
            <span class="tag">${values.bpm}</span>
            <span class="tag">${values.bars}</span>
            <span class="tag">${values.fileType}</span>
        `;

        idea.innerHTML =
            data.prompt ||
            "Generated AI sound ready";

        audioPlayer.src =
            data.audioUrl;

        audioPlayer.load();

        result.style.display = "block";

        setLoading(false);

    }catch(error){

        console.error(error);

        setLoading(false);

        alert(
            "Generation failed: " +
            error.message
        );
    }
}

</script>

</body>
</html>
