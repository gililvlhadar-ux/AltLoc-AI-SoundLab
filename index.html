<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>AltLoc AI SoundLab</title>

<style>

body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#090909;
    color:white;
    text-align:center;
}

header{
    padding:30px 20px;
    background:linear-gradient(135deg,#111,#222);
}

h1{
    font-size:34px;
    margin:0;
    color:#00ffcc;
}

p{
    color:#ccc;
}

.box{
    margin:25px auto;
    padding:20px;
    width:85%;
    max-width:420px;
    background:#161616;
    border-radius:18px;
    box-shadow:0 0 20px rgba(0,255,204,0.15);
}

select{
    width:100%;
    padding:18px;
    margin-top:18px;
    border:none;
    border-radius:16px;
    font-size:18px;
}

button{
    margin-top:22px;
    width:100%;
    padding:18px;
    border:none;
    border-radius:18px;
    background:#11f0c8;
    color:black;
    font-size:20px;
    font-weight:bold;
    cursor:pointer;
}

button:hover{
    opacity:0.9;
}

#loadingContainer{
    position:relative;
    margin-top:20px;
}

#loadingBar{
    width:100%;
    height:18px;
    background:#11f0c8;
    border-radius:20px;
    animation:loading 2s linear infinite;
}

#closeBanner{
    position:absolute;
    top:-12px;
    right:0;
    background:transparent;
    border:none;
    color:white;
    font-size:22px;
    cursor:pointer;
    width:auto;
    padding:0;
}

#statusText{
    margin-top:12px;
    color:#aaa;
}

@keyframes loading{
    0%{opacity:0.4;}
    50%{opacity:1;}
    100%{opacity:0.4;}
}

#result{
    margin-top:28px;
    padding:25px;
    border-radius:18px;
    background:black;
}

#result h2{
    color:#00ffcc;
    font-size:28px;
}

#result p{
    font-size:20px;
    color:#ddd;
}

</style>
</head>

<body>

<header>
    <h1>AltLoc AI SoundLab</h1>
    <p>AI Sound Pack Generator</p>
</header>

<div class="box">

    <h2>Create Sound Pack</h2>

    <select id="genre">
        <option>Techno</option>
        <option>Psytrance</option>
        <option>Afro House</option>
        <option>Melodic Techno</option>
        <option>Progressive</option>
    </select>

    <select id="soundType">
        <option>Kick</option>
        <option>Bass</option>
        <option>FX</option>
        <option>Lead</option>
        <option>Atmosphere</option>
    </select>

    <button onclick="generateIdea()">
        Generate Sound Idea
    </button>

    <div id="loadingContainer" style="display:none;">

        <button id="closeBanner" onclick="closeBanner()">✖</button>

        <div id="loadingBar"></div>

        <p id="statusText">Generation Complete ✅</p>

    </div>

    <div id="result">

        <h2>🔥 Generated Idea:</h2>

        <p id="ideaText">
            Waiting for generation...
        </p>

    </div>

</div>

<script>

function closeBanner(){
    document.getElementById("loadingContainer").style.display = "none";
}

function generateIdea(){

    const genre = document.getElementById("genre").value;
    const type = document.getElementById("soundType").value;

    const ideas = [

        `${genre} cinematic ${type} with huge festival energy`,
        `${genre} dark underground ${type} pack`,
        `${genre} aggressive distorted ${type} collection`,
        `${genre} atmospheric dreamy ${type} textures`,
        `${genre} psytrance festival drops and risers collection`,
        `${genre} analog warm ${type} sounds`,
        `${genre} futuristic robotic ${type} kit`,
        `${genre} industrial warehouse ${type} pack`,
        `${genre} emotional melodic ${type} soundbank`

    ];

    const randomIdea =
        ideas[Math.floor(Math.random() * ideas.length)];

    document.getElementById("ideaText").innerText =
        randomIdea;

    document.getElementById("loadingContainer").style.display =
        "block";

    setTimeout(() => {
        document.getElementById("loadingContainer").style.display =
            "none";
    }, 5000);

}

</script>

</body>
</html>
