<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AltLoc AI SoundLab</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #090909;
      color: white;
      text-align: center;
    }

    header {
      padding: 30px 20px;
      background: linear-gradient(135deg, #111, #222);
    }

    h1 {
      font-size: 34px;
      margin: 0;
      color: #00ffcc;
    }

    p {
      color: #ccc;
    }

    .box {
      margin: 25px auto;
      padding: 20px;
      width: 85%;
      max-width: 420px;
      background: #161616;
      border-radius: 18px;
      box-shadow: 0 0 20px #00ffcc33;
    }

    select, button {
      width: 100%;
      padding: 14px;
      margin-top: 15px;
      border-radius: 12px;
      border: none;
      font-size: 16px;
    }

    button {
      background: #00ffcc;
      color: #000;
      font-weight: bold;
    }

    .result {
      margin-top: 20px;
      padding: 15px;
      background: #000;
      border-radius: 12px;
      color: #00ffcc;
      min-height: 80px;
    }
  </style>
</head>
<body>

  <header>
    <h1>AltLoc AI SoundLab</h1>
    <p>AI Sound Pack Generator</p>
  </header>

  <div class="box">
    <h2>Create Sound Pack</h2>

    <select id="style">
      <option value="Psytrance">Psytrance</option>
      <option value="Techno">Techno</option>
      <option value="Afro House">Afro House</option>
      <option value="Cinematic">Cinematic</option>
      <option value="Trap">Trap</option>
    </select>

    <select id="type">
      <option value="Kick">Kick</option>
      <option value="Bass">Bass</option>
      <option value="FX">FX</option>
      <option value="Vocal Chop">Vocal Chop</option>
      <option value="Full Pack">Full Pack</option>
    </select>

    <button onclick="generatePack()">Generate Sound Idea</button>

    <div class="result" id="result">
      Your sound pack idea will appear here...
    </div>
  </div>

  <script>
    function generatePack() {
      const style = document.getElementById("style").value;
      const type = document.getElementById("type").value;

      const ideas = [
        "Wide stereo metallic FX with delay ping-pong",
        "Deep punchy kick with analog saturation",
        "Rolling offbeat bass with clean low-end",
        "Robotic vocal chop with granular texture",
        "Festival-ready pack with risers, impacts and drops",
        "Dark underground loop with hypnotic movement",
        "High quality sound pack ready for music producers"
      ];

      const randomIdea = ideas[Math.floor(Math.random() * ideas.length)];

      document.getElementById("result").innerHTML =
        "<strong>" + style + " " + type + "</strong><br><br>" +
        randomIdea + "<br><br>" +
        "Status: Demo generator active";
    }
  </script>

</body>
</html>
